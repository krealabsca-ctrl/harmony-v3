# nginx.conf — Configuración de Nginx para Harmony v3
#
# Instrucciones de instalación:
#   1. Reemplaza "harmony.tuempresa.com" con tu dominio real en todo el archivo
#   2. Copia a: /etc/nginx/sites-available/harmony
#   3. Activa: ln -s /etc/nginx/sites-available/harmony /etc/nginx/sites-enabled/
#   4. Elimina default: rm -f /etc/nginx/sites-enabled/default
#   5. Verifica: nginx -t
#   6. Obtén SSL: certbot --nginx -d harmony.tuempresa.com
#   7. Reinicia: systemctl restart nginx

server {
    listen 80;
    server_name harmony.tuempresa.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name harmony.tuempresa.com;

    # Certificados SSL generados por Certbot (se completan automáticamente)
    ssl_certificate /etc/letsencrypt/live/harmony.tuempresa.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/harmony.tuempresa.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Encoding UTF-8 global
    charset utf-8;

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Frontend React (archivos estáticos)
    root /var/www/harmony;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché agresiva para assets con hash de Vite
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # API Go — proxy reverso
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        client_max_body_size 50M;
    }

    # WebSocket (tiempo real)
    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Archivos subidos por usuarios
    location /uploads/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
