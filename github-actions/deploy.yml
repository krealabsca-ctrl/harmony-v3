# deploy.yml — GitHub Actions workflow para despliegue automático de Harmony v3
#
# INSTRUCCIONES:
#   1. Copia este archivo a tu repositorio en: .github/workflows/deploy.yml
#   2. Agrega los 3 secrets en tu repo: Settings → Secrets → Actions:
#        SERVER_HOST      = IP pública de tu servidor (Azure o DigitalOcean)
#        SERVER_USER      = usuario SSH (ej: "root" en DO, o el usuario que creaste en Azure)
#        SSH_PRIVATE_KEY  = contenido completo de tu clave privada SSH
#   3. El deploy se activa automáticamente en cada push a la rama "main"

name: Deploy Harmony v3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            bash /opt/harmony/deploy.sh 2>&1
